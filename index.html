<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책 재생산 시스템</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 25px;
            border-bottom: 2px solid #007aff;
            padding-bottom: 10px;
        }
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .book-item {
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .book-item:hover {
            background: #e8f4ff;
            border-color: #007aff;
            transform: translateY(-2px);
        }
        .book-title {
            font-weight: bold;
            color: #222;
        }
        .book-page {
            font-size: 13px;
            color: #666;
            background: #e9ecef;
            padding: 3px 8px;
            border-radius: 12px;
        }
        /* 로딩 화면 스타일 */
        .loading-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .time-text {
            color: #ff3b30;
            font-weight: bold;
            font-size: 16px;
        }
        .back-btn {
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 메인 화면 -->
    <div id="main-view">
        <h1>책 재생산 목록</h1>
        <div class="book-list">
            <!-- 분량(페이지 수)에 따라 예상 시간이 다르게 계산됩니다 -->
            <div class="book-item" onclick="startReproduction('데미안', 240)">
                <span class="book-title">데미안</span>
                <span class="book-page">240 p</span>
            </div>
            <div class="book-item" onclick="startReproduction('어린 왕자', 120)">
                <span class="book-title">어린 왕자</span>
                <span class="book-page">120 p</span>
            </div>
            <div class="book-item" onclick="startReproduction('1984', 420)">
                <span class="book-title">1984</span>
                <span class="book-page">420 p</span>
            </div>
            <div class="book-item" onclick="startReproduction('위대한 개츠비', 280)">
                <span class="book-title">위대한 개츠비</span>
                <span class="book-page">280 p</span>
            </div>
            <div class="book-item" onclick="startReproduction('노인과 바다', 150)">
                <span class="book-title">노인과 바다</span>
                <span class="book-page">150 p</span>
            </div>
            <div class="book-item" onclick="startReproduction('코스모스', 700)">
                <span class="book-title">코스모스</span>
                <span class="book-page">700 p</span>
            </div>
        </div>
    </div>

    <!-- 재생산 진행 화면 -->
    <div id="loading-view" class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text"><span id="selected-book"></span><br>책 재생산 중...</div>
        <div class="time-text">예상 소요 시간: <span id="estimated-time"></span></div>
        <button class="back-btn" onclick="resetView()">처음으로 돌아가기</button>
    </div>
</div>

<script>
    function startReproduction(bookName, pages) {
        // 1. 확인/취소 팝업창 띄우기
        const confirmCheck = confirm(`[${bookName}] 재생산을 시작하시겠습니까?`);
        
        if (confirmCheck) {
            // 2. 확인을 누른 경우: 분량에 따른 시간 계산 (4시간 ~ 6시간 사이)
            // 최소 120쪽 이하 4시간, 최대 600쪽 이상 6시간, 그 사이는 비례 계산
            let hours = 4;
            if (pages >= 600) {
                hours = 6;
            } else if (pages > 120) {
                // 120p~600p 사이를 4시간~6시간으로 변환하는 수식
                hours = 4 + ((pages - 120) / (600 - 120)) * 2;
            }
            
            // 소수점 첫째 자리까지 표기 (예: 4.5시간)
            const formattedTime = hours.toFixed(1);

            // 화면 전환
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('loading-view').style.display = 'block';
            
            // 데이터 매핑
            document.getElementById('selected-book').innerText = bookName;
            document.getElementById('estimated-time').innerText = `${formattedTime}시간`;
        } else {
            // 3. 취소를 누른 경우: 아무 동작 안 함 (이전 상태 유지)
            console.log("재생산이 취소되었습니다.");
        }
    }

    function resetView() {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }
</script>

</body>
</html>
